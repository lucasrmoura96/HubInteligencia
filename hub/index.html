<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HUB de Inteligência · Agroadvance</title>
  <link rel="stylesheet" href="assets/css/theme.css?v=563ef74128" />
</head>
<body>

<main class="home">

  <a class="home-mark brand-logo" href="index.html" aria-label="Agroadvance">
    <img src="assets/img/LogoAgro.png" alt="Agroadvance" class="brand-logo-img" />
  </a>

  <div class="home-toggle">
    <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
      <svg class="tt-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="tt-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>

  <div class="home-inner home-inner-clean">

    <h1 class="home-title">HUB de<br/><em>Inteligência</em></h1>

    <div class="home-actions">

      <a class="btn-liquid btn-clean brand" href="area-mkt.html">
        <span class="btn-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 6-6"/></svg>
        </span>
        <span class="btn-label-center">Performance &amp; MKT</span>
        <span class="btn-arrow">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </span>
      </a>

      <a class="btn-liquid btn-clean accent" href="performance-comercial.html">
        <span class="btn-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        </span>
        <span class="btn-label-center">Comercial</span>
        <span class="btn-arrow">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </span>
      </a>

    </div>
  </div>

  <div class="home-foot">
    <span class="pulse"></span>
    <span id="updateText">Carregando…</span>
  </div>
</main>

<script>
  // Theme
  (function() {
    const saved = localStorage.getItem('hub-theme') || 'light';
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('hub-theme', next);
    });
  })();
  // Última atualização — lê o meta PÚBLICO (não sensível: só data)
  (function() {
    const el = document.getElementById('updateText');
    fetch('dados/ultima_atualizacao.json', { cache: 'no-store' })
      .then(r => r.json())
      .then(meta => {
        const upd = new Date(meta.atualizado_em);
        el.textContent = 'Atualizado em ' + upd.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
      })
      .catch(() => { el.textContent = 'HUB de Inteligência'; });
  })();
</script>

</body>
</html>
